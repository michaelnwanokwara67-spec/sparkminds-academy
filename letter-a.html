<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sparkminds Academy · Letter A</title>
  <style>
    /* ===== RESET & GLOBAL ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Quicksand', sans-serif;
      background: linear-gradient(145deg, #f9f7f3 0%, #f0e9da 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* ===== MAIN CARD ===== */
    .lesson-card {
      max-width: 900px;
      width: 100%;
      background: white;
      border-radius: 60px 60px 40px 40px;
      box-shadow: 0 20px 30px rgba(0, 0, 0, 0.1), 0 8px 12px rgba(0, 0, 0, 0.05);
      overflow: hidden;
      padding: 30px;
      border: 4px solid white;
      outline: 3px solid #FFD166;
    }

    /* ===== HEADER ===== */
    .header {
      text-align: center;
      margin-bottom: 25px;
    }

    .header h1 {
      font-size: 4rem;
      color: #118AB2;
      text-shadow: 4px 4px 0 #FFD166;
      letter-spacing: 4px;
      margin-bottom: 5px;
    }

    .header h2 {
      font-size: 2rem;
      color: #EF476F;
      background: #FFD166;
      display: inline-block;
      padding: 8px 30px;
      border-radius: 40px;
      transform: rotate(-1deg);
    }

    /* ===== VIDEO CONTAINER ===== */
    .video-box {
      background: #06D6A0;
      padding: 15px;
      border-radius: 40px;
      margin-bottom: 30px;
      box-shadow: inset 0 -4px 0 #049e76;
    }

    .video-wrapper {
      position: relative;
      width: 100%;
      padding-bottom: 56.25%; /* 16:9 aspect ratio */
      border-radius: 30px;
      overflow: hidden;
      background: black;
    }

    .video-wrapper iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    /* ===== EXERCISE AREA ===== */
    .exercise {
      background: #FFD166;
      border-radius: 40px;
      padding: 30px;
      margin-top: 20px;
      box-shadow: 0 10px 0 #e6b85c;
    }

    .question {
      font-size: 2rem;
      font-weight: 700;
      color: #073b4c;
      margin-bottom: 25px;
      text-align: center;
    }

    .options {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin-bottom: 30px;
    }

    .option-btn {
      background: white;
      border: none;
      border-radius: 60px;
      padding: 20px 35px;
      font-size: 2rem;
      font-weight: 600;
      color: #073b4c;
      box-shadow: 0 8px 0 #cccccc;
      cursor: pointer;
      transition: all 0.1s ease;
      flex: 1 1 auto;
      min-width: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .option-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 0 #aaaaaa;
    }

    .option-btn:active {
      transform: translateY(6px);
      box-shadow: 0 2px 0 #aaaaaa;
    }

    .feedback {
      font-size: 1.8rem;
      text-align: center;
      padding: 15px;
      border-radius: 50px;
      background: white;
      margin-bottom: 20px;
      display: none;
    }

    .feedback.correct {
      background: #06D6A0;
      color: #073b4c;
      display: block;
    }

    .feedback.incorrect {
      background: #EF476F;
      color: white;
      display: block;
    }

    .next-btn {
      background: #118AB2;
      border: none;
      border-radius: 60px;
      padding: 18px 45px;
      font-size: 2rem;
      font-weight: bold;
      color: white;
      box-shadow: 0 8px 0 #0a5e7e;
      cursor: pointer;
      transition: 0.1s ease;
      width: fit-content;
      margin: 20px auto 0;
    }

    .next-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 0 #0a5e7e;
    }

    .next-btn:active {
      transform: translateY(6px);
      box-shadow: 0 2px 0 #0a5e7e;
    }

    /* ===== ALPHABET GRID (for homepage) ===== */
    .alphabet-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
      gap: 15px;
      margin-top: 30px;
    }

    .letter-box {
      background: #06D6A0;
      border-radius: 25px;
      padding: 20px 0;
      text-align: center;
      font-size: 3rem;
      font-weight: bold;
      color: white;
      text-shadow: 3px 3px 0 #118AB2;
      box-shadow: 0 8px 0 #049e76;
      cursor: pointer;
      transition: 0.1s ease;
    }

    .letter-box:hover {
      transform: translateY(-3px);
      box-shadow: 0 11px 0 #049e76;
    }

    .letter-box:active {
      transform: translateY(5px);
      box-shadow: 0 3px 0 #049e76;
    }
  </style>
  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="lesson-card" id="app">
  <div class="header">
    <h1>✨Sparkminds✨</h1>
    <h2>Letter A</h2>
  </div>

  <!-- Video Section (Google Drive Embed) -->
  <div class="video-box">
    <div class="video-wrapper">
      <!-- Replace this src with your actual Google Drive video ID -->
      <iframe src="https://drive.google.com/file/d/1WBjIz6X0gk4vJ926LsQ2m9kjyHLJabaY/view?usp=drive_link" allow="autoplay"></iframe>
    </div>
    <p style="text-align:center; color:white; font-weight:600; margin-top:10px;">📺 Watch and learn the letter A!</p>
  </div>

  <!-- Exercise Section -->
  <div class="exercise">
    <div class="question">Which picture starts with the letter A?</div>

    <div class="options" id="optionsContainer">
      <button class="option-btn" data-index="0">🍎 Apple</button>
      <button class="option-btn" data-index="1">⚽ Ball</button>
      <button class="option-btn" data-index="2">🐱 Cat</button>
    </div>

    <div id="feedback" class="feedback"></div>
    <button id="nextLesson" class="next-btn" style="display: none;">Next Letter →</button>
  </div>
</div>

<!-- Mini Alphabet Grid (preview of what's coming) -->
<div style="max-width:900px; width:100%; margin-top:40px;">
  <h3 style="color:#118AB2; font-size:2rem; margin-bottom:15px; text-align:center;">Explore the alphabet</h3>
  <div class="alphabet-grid">
    <!-- Generate letters A–Z (just visual for now) -->
    <div class="letter-box">A</div>
    <div class="letter-box">B</div>
    <div class="letter-box">C</div>
    <div class="letter-box">D</div>
    <div class="letter-box">E</div>
    <div class="letter-box">F</div>
    <div class="letter-box">G</div>
    <div class="letter-box">H</div>
    <div class="letter-box">I</div>
    <div class="letter-box">J</div>
    <div class="letter-box">K</div>
    <div class="letter-box">L</div>
    <div class="letter-box">M</div>
    <div class="letter-box">N</div>
    <div class="letter-box">O</div>
    <div class="letter-box">P</div>
    <div class="letter-box">Q</div>
    <div class="letter-box">R</div>
    <div class="letter-box">S</div>
    <div class="letter-box">T</div>
    <div class="letter-box">U</div>
    <div class="letter-box">V</div>
    <div class="letter-box">W</div>
    <div class="letter-box">X</div>
    <div class="letter-box">Y</div>
    <div class="letter-box">Z</div>
  </div>
</div>

<script>
  // Simple interactive quiz for letter A
  const options = document.querySelectorAll('.option-btn');
  const feedbackDiv = document.getElementById('feedback');
  const nextBtn = document.getElementById('nextLesson');
  const correctIndex = 0; // Apple is correct

  options.forEach(btn => {
    btn.addEventListener('click', (e) => {
      const selected = parseInt(e.target.dataset.index);
      
      if (selected === correctIndex) {
        // Correct answer
        feedbackDiv.className = 'feedback correct';
        feedbackDiv.textContent = '✅ Perfect! Apple starts with A!';
        nextBtn.style.display = 'block';
        // Disable further clicks
        options.forEach(b => b.disabled = true);
      } else {
        // Wrong answer
        feedbackDiv.className = 'feedback incorrect';
        feedbackDiv.textContent = '❌ Oops! Try again.';
        // Optionally shake the button
        e.target.style.transform = 'translateX(5px)';
        setTimeout(() => e.target.style.transform = '', 200);
      }
    });
  });

  // Next letter button (for demo, just reloads same page – we'll later link to B)
  nextBtn.addEventListener('click', () => {
    alert('Next letter (B) will come soon! 🚀');
    // In the future: window.location.href = 'letter-b.html';
  });
</script>

<!-- Note: In a real implementation, replace the video src with your actual Google Drive embed link -->
</body>
</html>
